name: OdesaAlert Core CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      # Поднимаем реальный Redis прямо в контейнере GitHub для интеграционных тестов
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout source code code layout
      uses: actions/checkout@v4

    - name: Set up Python environment environment (3.11)
      uses: actions/with-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install production and dev dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run Ruff Linter Engine (Static Analysis)
      run: ruff check .

    - name: Run Ruff Code Formatter Verification
      run: ruff format --check .

    - name: Run Mypy Strict Type Checking
      run: mypy alert_bot_project/

    - name: Run Bandit Security Vulnerability Audit
      run: bandit -c pyproject.toml -r alert_bot_project/

    - name: Run Complete Pytest Suite Engine (Units & Integration)
      env:
        # Подсовываем фейковые переменные для прохождения тестов конфигурации Pydantic
        BOT_TOKEN: "123456:fake_token"
        GROUP_ID: "-100123456"
        API_ID: "123456"
        API_HASH: "fake_hash"
        DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/postgres"
        REDIS_URL: "redis://localhost:6379/0"
      run: pytest