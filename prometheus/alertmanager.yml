global:
  # Время, по истечении которого алерт считается разрешенным, если Prometheus перестал присылать по нему данные
  resolve_timeout: 5m

route:
  # Группировка однотипных алертов, чтобы не спамить в чат пачками сообщений
  group_by: ['alertname', 'job']

  # Сколько времени ждать перед отправкой первого уведомления, чтобы собрать алерты одной группы
  group_wait: 30s

  # Как часто отправлять уведомления о новых алертах в уже существующей группе
  group_interval: 5m

  # Через какое время дублировать алерт, если проблема до сих пор не решена
  repeat_interval: 3h

  # Приемник по умолчанию для всех маршрутов
  receiver: 'telegram_admin'

receivers:
  - name: 'telegram_admin'
    telegram_configs:
      - bot_token: '${BOT_TOKEN}'
        chat_id: ${ADMIN_CHAT_ID}
        parse_mode: 'HTML'

        # ✅ КРИТИЧЕСКИЙ ФИКС: Принудительно включаем отправку сообщений при восстановлении систем
        send_resolved: true

        # ✅ УЛУЧШЕНИЕ: Интеллектуальный Go-шаблон с разделением визуального стиля для ТРЕВОГИ и ВОССТАНОВЛЕНИЯ
        message: |-
          {{ if eq .Status "resolved" }}
          ✅ <b>[ВОССТАНОВЛЕНИЕ] Система работает в штатном режиме</b>
          {{ range .Alerts }}
          📌 <b>Алерт:</b> {{ .Labels.alertname }}
          📝 <b>Суть:</b> {{ .Annotations.summary }}
          <i>Период сбоя успешно завершен. Контейнеры стабильны.</i>
          {{ end }}
          {{ else }}
          🚨 <b>[ТРЕВОГА] Фиксация системного сбоя</b>
          {{ range .Alerts }}
          📌 <b>Алерт:</b> {{ .Labels.alertname }} (Ранг: {{ .Labels.severity }})
          📝 <b>Суть:</b> {{ .Annotations.summary }}
          🔍 <b>Детали:</b> {{ .Annotations.description }}
          <i>Текущий статус: {{ .Status }}</i>
          {{ end }}
          {{ end }}