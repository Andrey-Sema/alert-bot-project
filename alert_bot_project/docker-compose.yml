version: '3.8'

# Выносим общие настройки в якорь для соблюдения DRY
x-common-service: &common-service
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  restart: unless-stopped
  volumes:
    - shared_logs:/data/logs
  depends_on:
    migrator:
      condition: service_completed_successfully

services:
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m alert_bot_project.database.migration
    env_file:
      - .env
    restart: "no"

  scraper:
    <<: *common-service
    command: python -m alert_bot_project.scraper.main
    volumes:
      - pyrogram_session:/data/session
      - shared_logs:/data/logs
    expose:
      - "8001" # Безопасно светим порт метрик только внутри сети Docker
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  worker:
    <<: *common-service
    command: python -m alert_bot_project.worker.main
    expose:
      - "8000" # Prometheus заберет метрики отсюда
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  bot_ui:
    <<: *common-service
    command: python -m alert_bot_project.bot.main
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'alert_bot_project.bot.main' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.45.0
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090" # Защита от прямого доступа извне
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    depends_on:
      - worker
      - scraper

  grafana:
    image: grafana/grafana:10.0.3
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000" # Доступ только через localhost/reverse proxy
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    depends_on:
      - prometheus

volumes:
  pyrogram_session:
  shared_logs:
  prometheus_data:
  grafana_data: