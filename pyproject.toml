[tool.ruff]
# ✅ ФИКС: Синхронизируем линтер с реальным рантаймом python:3.11-slim из Dockerfile
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "B", "SIM", "S",
    "ASYNC", "UP", "N", "T20", "PT", "C4", "RUF"
]
ignore = []

[tool.ruff.lint.per-file-ignores]
# ✅ ФИКС: Расширили пул игноров для тестов (S106, S108), чтобы Hypothesis не штормило варнингами
"tests/**" = ["S101", "S105", "S106", "S108", "S311", "T201"]
# ✅ ФИКС: Разрешаем принты для нагрузочного скрипта stress_test.py
"alert_bot_project/scripts/**" = ["T201"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
plugins = ["sqlalchemy.ext.mypy.plugin"]
# ✅ ФИКС: Указываем верную версию для MyPy и убираем дублирующие флаги, которые уже включены в strict
python_version = "3.11"
strict = true
show_error_codes = true

[[tool.mypy.overrides]]
module = [
    "aiogram.*", "redis.*", "pyrogram.*",
    "sqlalchemy.*", "prometheus_client.*", "asyncpg.*"
]
ignore_missing_imports = true

[tool.pytest.ini_options]
addopts = "-ra -q --strict-markers --asyncio-mode=auto"
testpaths = ["tests"]
norecursedirs = [".venv", "venv", "env", "htmlcov", ".pytest_cache", ".git"]
asyncio_default_fixture_loop_scope = "function"

markers = [
    "integration: Энд-ту-энд интеграционные тесты сквозного пайплайна",
    "stress: Нагрузочные бенчмарки и стресс-тестирование очереди Redis"
]

# ✅ ФИКС: Исправлен синтаксис фильтрации варнингов, убрана кривая точечная нотация glob
filterwarnings = [
    "ignore::DeprecationWarning:aiogram",
    "ignore::DeprecationWarning:pyrogram",
    "ignore::DeprecationWarning:pydantic"
]